<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f7f6; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            padding-top: 10vh; /* ดันลงมาจากขอบบน 10% ของความสูงหน้าจอ */
        }
        .card { 
            border: none; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 350px; 
            height: fit-content; /* ให้กล่องสูงเท่ากับเนื้อหาภายใน */
        }
    </style>
</head>
<body>

    <div class="card p-4">
        <h3 class="text-center mb-4">Election 2026</h3>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Voter ID</label>
                <input type="text" name="voter_id" class="form-control" placeholder="กรอก ID ของคุณ" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
        </form>
    </div>

</body>
</html>
